name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release firmware (si déclenchée par une release)
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          ASSET="supermini_evse_${TAG}.bin"
          mkdir -p web_ble_ota/firmwares
          gh release download "$TAG" --pattern "$ASSET" --dir web_ble_ota/firmwares

      - name: Récupérer tous les firmwares des releases précédentes
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p web_ble_ota/firmwares
          gh release list --limit 50 --json tagName -q '.[].tagName' | while read TAG; do
            ASSET="supermini_evse_${TAG}.bin"
            if [ ! -f "web_ble_ota/firmwares/$ASSET" ]; then
              gh release download "$TAG" --pattern "$ASSET" --dir web_ble_ota/firmwares 2>/dev/null || true
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web_ble_ota/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4